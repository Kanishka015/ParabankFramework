name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run UI tests
        run: npx playwright test tests/ui/ --project=chromium

      - name: Run API tests
        run: npx playwright test tests/api/ --project=api

      - name: Run E2E hybrid tests
        run: npx playwright test tests/e2e/ --project=chromium

      - name: Run performance tests
        run: npx playwright test tests/performance-lite/ --project=chromium

      - name: Generate Allure report
        if: always()
        run: npx allure generate reports/allure-results --clean -o reports/allure-report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/html/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 14

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: reports/test-artifacts/
          retention-days: 7
